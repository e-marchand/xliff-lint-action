name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install pytest
      - run: pytest -v
        working-directory: ${{ github.workspace }}

  action-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The fixture intentionally contains issues, so don't fail the job:
      # this just proves the composite action runs end-to-end and annotates.
      - name: Run the action against a fixture project
        uses: ./
        with:
          project-path: tests/fixtures/sync_project
          sync-languages: "fr,de"
          fail-on-error: "false"
